<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Counter</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-darker: #05070c;
            --bg-panel: #0b0f17;
            --border-subtle: #161f30;
            --border-active: #23334e;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.2);
            --success: #00ff66;
            --success-glow: rgba(0, 255, 102, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-dark: #475569;
            --grid-line: rgba(0, 240, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 24px 24px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(0, 240, 255, 0.04), transparent 70%);
            pointer-events: none;
            animation: ambientGlow 10s infinite ease-in-out;
        }

        .dashboard-wrapper {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            position: relative;
            z-index: 2;
            animation: dashboardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(0, 240, 255, 0.15);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            animation: lineScan 4s infinite linear;
            background-size: 200% 100%;
        }

        .panel-counter {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px;
            height: fit-content;
        }

        .meta-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .counter-wrapper {
            margin: 40px 0;
            position: relative;
            display: inline-block;
        }

        .counter-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 6.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 0.9;
            letter-spacing: -2px;
            animation: counterPulse 3s infinite ease-in-out;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(0, 240, 255, 0.02);
            border: 1px solid rgba(0, 240, 255, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: fit-content;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .panel-main {
            padding: 32px;
            display: flex;
            flex-direction: column;
            min-height: 480px;
        }

        .panel-main::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .view-indicator {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .data-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            background-color: #111827;
            border: 1px solid var(--border-subtle);
            padding: 2px 10px;
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .action-toggle {
            font-family: 'JetBrains Mono', monospace;
            background-color: #111827;
            border: 1px solid var(--border-subtle);
            color: var(--text-dark);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-toggle:hover {
            border-color: var(--border-active);
        }

        .action-toggle:active {
            transform: scale(0.96);
        }

        .toggle-split {
            transition: color 0.2s ease;
        }

        .toggle-split.active-mode {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }

        .toggle-split.active-mode-success {
            color: var(--success);
            text-shadow: 0 0 8px var(--success-glow);
        }

        .toggle-divider {
            color: var(--border-subtle);
            font-weight: 400;
        }

        .terminal-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 360px;
            padding-right: 6px;
        }

        .terminal-list::-webkit-scrollbar {
            width: 4px;
        }

        .terminal-list::-webkit-scrollbar-thumb {
            background-color: var(--border-subtle);
            border-radius: 2px;
            transition: background-color 0.2s;
        }

        .terminal-list::-webkit-scrollbar-thumb:hover {
            background-color: var(--border-active);
        }

        .log-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 14px 18px;
            background-color: rgba(17, 24, 39, 0.2);
            border: 1px solid var(--border-subtle);
            margin-bottom: 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            animation: logFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.2s ease;
        }

        .log-row:hover {
            border-color: var(--border-active);
            background-color: rgba(22, 31, 48, 0.4);
            transform: translateX(2px);
        }

        .log-row.terminal-left {
            border-left: 3px solid var(--text-dark);
            opacity: 0.45;
        }

        .device-string {
            font-size: 0.85rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .flag-offline {
            font-size: 0.65rem;
            background-color: rgba(244, 63, 94, 0.1);
            color: #f43f5e;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 700;
            animation: badgeFlash 2s infinite ease-in-out;
        }

        .timestamp-string {
            font-size: 0.7rem;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .geo-string {
            font-size: 0.75rem;
            background-color: #111827;
            border: 1px solid var(--border-subtle);
            padding: 4px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .log-row:hover .geo-string {
            color: var(--text-primary);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .empty-terminal-prompt {
            text-align: center;
            padding: 40px;
            color: var(--text-dark);
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .flicker-effect {
            animation: uiFlicker 0.15s steps(2) 2;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        @keyframes counterPulse {
            0%, 100% { text-shadow: 0 0 20px var(--primary-glow); opacity: 0.95; }
            50% { text-shadow: 0 0 40px var(--primary-glow), 0 0 10px var(--primary); opacity: 1; }
        }

        @keyframes ambientGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        @keyframes lineScan {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes dashboardEnter {
            0% { opacity: 0; transform: translateY(15px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes logFadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes badgeFlash {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        @keyframes uiFlicker {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @media (max-width: 850px) {
            .dashboard-wrapper {
                grid-template-columns: 1fr;
            }
            .panel-counter {
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="panel panel-counter">
            <div>
                <div class="meta-header">
                    <span>SYS_STATUS // RUNNING</span>
                    <span>v1.2.4</span>
                </div>
                <h2 class="panel-title">Active Visitor</h2>
            </div>
            
            <div class="counter-wrapper">
                <div class="counter-number" id="visitorCount">0</div>
            </div>
            
            <div class="status-badge" id="statusBadge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">SINGLE_NODE_MODE</span>
            </div>
        </div>

        <div class="panel panel-main" id="mainTerminalPanel">
            <div class="main-header">
                <div class="header-info">
                    <span class="view-indicator" id="listTitle">Active Devices</span>
                    <span class="data-tag" id="listCount">0 Online</span>
                </div>
                
                <button class="action-toggle" onclick="toggleView()">
                    <span class="toggle-split" id="modeOnline">ONLINE</span>
                    <span class="toggle-divider">/</span>
                    <span class="toggle-split" id="modeLogs">LOGS</span>
                </button>
            </div>
            
            <ul class="terminal-list" id="userList"></ul>
        </div>
    </div>

    <script>
        let globalData = { active: [], recent: [] };
        let currentView = 'ACTIVE';

        if (typeof io !== 'undefined') {
            const socket = io();

            socket.on('connect', () => {
                const now = new Date();
                const localTimeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const localDateString = now.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
                
                socket.emit('initUser', { 
                    localTime: localTimeString,
                    localDate: localDateString
                });
            });

            socket.on('updateUsers', (data) => {
                globalData = data;
                renderList();      
            });
        } else {
            setTimeout(() => { renderList(); }, 300);
        }

        function renderList() {
            const activeCount = globalData.active.length;
            const countEl = document.getElementById('visitorCount');
            const badgeEl = document.getElementById('statusBadge');
            const dotEl = document.getElementById('statusDot');
            const textEl = document.getElementById('statusText');
            
            countEl.innerText = activeCount;
            
            if(activeCount > 1) {
                countEl.style.animation = 'counterPulse 1.5s infinite ease-in-out';
                countEl.style.color = 'var(--success)';
                badgeEl.style.color = 'var(--success)';
                badgeEl.style.borderColor = 'rgba(0, 255, 102, 0.15)';
                badgeEl.style.backgroundColor = 'rgba(0, 255, 102, 0.02)';
                dotEl.style.backgroundColor = 'var(--success)';
                dotEl.style.boxShadow = '0 0 10px var(--success)';
                textEl.innerText = "CLUSTER_STABLE_UP";
            } else {
                countEl.style.animation = 'counterPulse 3s infinite ease-in-out';
                countEl.style.color = 'var(--primary)';
                badgeEl.style.color = 'var(--primary)';
                badgeEl.style.borderColor = 'rgba(0, 240, 255, 0.1)';
                badgeEl.style.backgroundColor = 'rgba(0, 240, 255, 0.02)';
                dotEl.style.backgroundColor = 'var(--primary)';
                dotEl.style.boxShadow = '0 0 10px var(--primary)';
                textEl.innerText = "SINGLE_NODE_MODE";
            }

            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '';

            const targetList = currentView === 'ACTIVE' ? globalData.active : globalData.recent;
            const btnOnline = document.getElementById('modeOnline');
            const btnLogs = document.getElementById('modeLogs');
            
            if (currentView === 'ACTIVE') {
                document.getElementById('listTitle').innerText = "Active Devices";
                document.getElementById('listCount').innerText = `${activeCount} Online`;
                
                btnOnline.className = "toggle-split active-mode";
                btnLogs.className = "toggle-split";
            } else {
                document.getElementById('listTitle').innerText = "Logs";
                document.getElementById('listCount').innerText = `${globalData.recent.length} Total`;
                
                btnOnline.className = "toggle-split";
                btnLogs.className = "toggle-split active-mode-success";
            }

            if (targetList.length === 0) {
                userListEl.innerHTML = `<li class="empty-terminal-prompt">> STREAM_EMPTY: Awaiting remote connection...</li>`;
                return;
            }

            targetList.forEach((user, index) => {
                const isOffline = user.disconnected === true;
                const li = document.createElement('li');
                li.className = `log-row ${isOffline ? 'terminal-left' : ''}`;
                li.style.animationDelay = `${index * 0.03}s`;
                
                li.innerHTML = `
                    <div>
                        <div class="device-string">
                            <span>> ${user.device}</span>
                            ${isOffline ? '<span class="flag-offline">DISCONNECTED</span>' : ''}
                        </div>
                        <div class="timestamp-string">
                            ${currentView === 'ACTIVE' ? 'STAMP' : 'EVENT'}: ${user.date} // ${user.time}
                        </div>
                    </div>
                    <span class="geo-string">${user.country}</span>
                `;
                userListEl.appendChild(li);
            });
        }

        function toggleView() {
            currentView = currentView === 'ACTIVE' ? 'RECENT' : 'ACTIVE';
            
            const terminal = document.getElementById('mainTerminalPanel');
            terminal.classList.add('flicker-effect');
            setTimeout(() => {
                terminal.classList.remove('flicker-effect');
            }, 300);

            renderList();
        }
    </script>
</body>
</html>
